services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET}
      MASTER_API_KEY: ${MASTER_API_KEY}
      API_KEY_PREFIX: ${API_KEY_PREFIX:-kyc_live_}
      STORAGE_PATH: /data/storage
      DB_PATH: /data/db/kyc.db
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      SESSION_TOKEN_TTL_HOURS: ${SESSION_TOKEN_TTL_HOURS:-2}
      RISK_APPROVE_THRESHOLD: ${RISK_APPROVE_THRESHOLD:-0.80}
      RISK_MANUAL_THRESHOLD: ${RISK_MANUAL_THRESHOLD:-0.55}
      ADDRESS_DOC_MAX_AGE_DAYS: ${ADDRESS_DOC_MAX_AGE_DAYS:-90}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_LIVENESS_ACCESS_KEY_ID: ${AWS_LIVENESS_ACCESS_KEY_ID}
      AWS_LIVENESS_SECRET_ACCESS_KEY: ${AWS_LIVENESS_SECRET_ACCESS_KEY}
    volumes:
      - kyc_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  kyc_data:
  certbot_www:
  certbot_conf:
